networks:
  adl-obs:
    name: adl-obs

volumes:
  prometheus-data: {}
  grafana-data: {}

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: adl-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - adl-obs
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: adl-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - adl-obs
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: adl-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    networks:
      - adl-obs
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: adl-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - adl-obs
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped
