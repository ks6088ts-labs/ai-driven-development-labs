networks:
  adl-obs:
    name: adl-obs

volumes:
  prometheus-data: {}
  grafana-data: {}

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: adl-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - adl-obs
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: adl-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - adl-obs
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: adl-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    networks:
      - adl-obs
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: adl-grafana
    environment:
      # Admin credentials – set GF_SECURITY_ADMIN_PASSWORD in .env (see .env.example).
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      # Basic Auth (local development). To switch to OIDC, replace the
      # GF_AUTH_BASIC_ENABLED block below with GF_AUTH_GENERIC_OAUTH_* variables.
      - GF_AUTH_BASIC_ENABLED=true
      # Anonymous access is disabled; every user must authenticate.
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # New sign-ups default to Viewer role.
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Viewer
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - adl-obs
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  # Short-lived init container: creates the "viewer" Grafana user on first start.
  # Remove or replace this service when migrating to OIDC / LDAP.
  grafana-setup:
    image: curlimages/curl:latest
    container_name: adl-grafana-setup
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      - GF_VIEWER_PASSWORD=${GF_VIEWER_PASSWORD:-viewerpass}
    volumes:
      - ./docker/observability/grafana/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks:
      - adl-obs
    depends_on:
      - grafana
    restart: "no"
